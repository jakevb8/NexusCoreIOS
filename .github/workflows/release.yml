name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  testflight:
    name: Archive & Upload to TestFlight
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Restore GoogleService-Info.plist
        run: |
          printf '%s' "$GOOGLE_SERVICES_B64" | base64 --decode > NexusCoreIOS/GoogleService-Info.plist
        env:
          GOOGLE_SERVICES_B64: ${{ secrets.GOOGLE_SERVICES_B64 }}

      - name: Derive version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          BUILD=$(git tag -l 'v*' | wc -l | tr -d ' ')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD" >> "$GITHUB_OUTPUT"
          echo "Tag: $TAG  →  version=$VERSION  build=$BUILD"

      - name: Bump version in project.yml
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BUILD="${{ steps.version.outputs.build }}"
          sed -i '' "s/MARKETING_VERSION: .*/MARKETING_VERSION: $VERSION/" project.yml
          sed -i '' "s/CURRENT_PROJECT_VERSION: .*/CURRENT_PROJECT_VERSION: $BUILD/" project.yml

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Import Distribution Certificate
        run: |
          # Decode the .p12 into a temp keychain so xcodebuild can sign
          CERT_PATH="$RUNNER_TEMP/dist_cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASSWORD="temp_keychain_pw"

          printf '%s' "$DIST_CERT_B64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" \
            -P "$DIST_CERT_PASSWORD" -T /usr/bin/codesign
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
        env:
          DIST_CERT_B64: ${{ secrets.IOS_DIST_CERT_B64 }}
          DIST_CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}

      - name: Install Provisioning Profile
        run: |
          PP_PATH="$RUNNER_TEMP/profile.mobileprovision"
          printf '%s' "$PROVISIONING_PROFILE_B64" | base64 --decode > "$PP_PATH"
          PP_UUID=$(grep -a -A 1 '<key>UUID</key>' "$PP_PATH" \
            | grep '<string>' | sed 's/.*<string>//;s/<\/string>.*//')
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$PP_UUID".mobileprovision
          echo "Installed profile UUID: $PP_UUID"
        env:
          PROVISIONING_PROFILE_B64: ${{ secrets.IOS_PROVISIONING_PROFILE_B64 }}

      - name: Resolve SPM packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project NexusCoreIOS.xcodeproj \
            -scheme NexusCoreIOS

      - name: Archive
        run: |
          xcodebuild archive \
            -project NexusCoreIOS.xcodeproj \
            -scheme NexusCoreIOS \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/NexusCoreIOS.xcarchive" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="NexusCore iOS Distribution" \
            | xcpretty

      - name: Export IPA
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/NexusCoreIOS.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/export"

      - name: Write App Store Connect API key
        run: |
          mkdir -p ~/.private_keys
          printf '%s' "$ASC_API_KEY_B64" | base64 --decode \
            > ~/.private_keys/AuthKey_${{ secrets.ASC_API_KEY_ID }}.p8
        env:
          ASC_API_KEY_B64: ${{ secrets.ASC_API_KEY_B64 }}

      - name: Upload to TestFlight
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file "$RUNNER_TEMP/export/NexusCoreIOS.ipa" \
            --apiKey "${{ secrets.ASC_API_KEY_ID }}" \
            --apiIssuer "${{ secrets.ASC_API_ISSUER }}" \
            --verbose

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
