name: NexusCoreIOS
options:
  bundleIdPrefix: me.jakev
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: 5.9
    ENABLE_PREVIEWS: YES
    MARKETING_VERSION: 1.0
    CURRENT_PROJECT_VERSION: 1

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: 11.0.0
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: 8.0.0

targets:
  NexusCoreIOS:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - NexusCoreIOS
    settings:
      base:
        INFOPLIST_FILE: NexusCoreIOS/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: me.jakev.nexuscore
        DEVELOPMENT_TEAM: G7XSDHT6NG
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: 5.9
    dependencies:
      - package: Firebase
        product: FirebaseCore
      - package: Firebase
        product: FirebaseAuth
      - package: GoogleSignIn
        product: GoogleSignIn
    info:
      path: NexusCoreIOS/Info.plist
      properties:
        CFBundleName: NexusCoreIOS
        CFBundleDisplayName: NexusCore
        CFBundleIdentifier: me.jakev.nexuscore
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        LSRequiresIPhoneOS: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        UILaunchScreen: {}
        NSCameraUsageDescription: ""
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - com.googleusercontent.apps.797114794124-rg008tdv36l4u8aa0sq9esvagmo48kin
        GIDClientID: 797114794124-rg008tdv36l4u8aa0sq9esvagmo48kin.apps.googleusercontent.com

  NexusCoreIOSTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - NexusCoreIOSTests
    settings:
      base:
        SWIFT_VERSION: 5.9
        PRODUCT_BUNDLE_IDENTIFIER: me.jakev.nexuscore.tests
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: G7XSDHT6NG
    info:
      path: NexusCoreIOSTests/Info.plist
      properties:
        CFBundleName: NexusCoreIOSTests
        CFBundleIdentifier: me.jakev.nexuscore.tests
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
    dependencies:
      - target: NexusCoreIOS
